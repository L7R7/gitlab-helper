resolver: lts-22.22

packages:
  - .

extra-deps:
  - github: L7R7/gitlab-api
    commit: db7ece328be2cbb7941270ef903c64ecc2ad23c7
    subdirs:
      - gitlab-api-http-client
      - gitlab-api-http-client-mtl
      - gitlab-api-types
  - github: L7R7/opt-env-conf
    commit: 28ca5e35b2d437cfd30f91fb3a466855b77b595b
    subdirs:
      - opt-env-conf
      - opt-env-conf-test
  - github: NorfairKing/safe-coloured-text
    commit: a58b782acc873a40a0eeb20eb4dc22c6df9c9dee
    subdirs:
      - safe-coloured-text
      - safe-coloured-text-layout
      - safe-coloured-text-gen
  - github: NorfairKing/autodocodec
    commit: 36779707f38ec3aeb0a591ff8043a63717c96ea2
    subdirs:
      - autodocodec
      - autodocodec-yaml
      - autodocodec-schema

system-ghc: true

ghc-options:
  $everything: -split-sections
  "$locals": -fwrite-ide-info
