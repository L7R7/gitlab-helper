resolver: lts-22.22

packages:
  - .

extra-deps:
  - github: L7R7/gitlab-api
    commit: db7ece328be2cbb7941270ef903c64ecc2ad23c7
    subdirs:
      - gitlab-api-http-client
      - gitlab-api-http-client-mtl
      - gitlab-api-types
  - github: NorfairKing/opt-env-conf
    commit: aca7601a7bf2e322318acb600d91586441fc027c
    subdirs:
      - opt-env-conf
      - opt-env-conf-test
  - github: NorfairKing/safe-coloured-text
    commit: 26b7657428f277f819a0831cbddddb7f4c5408f9
    subdirs:
      - safe-coloured-text
      - safe-coloured-text-layout
      - safe-coloured-text-gen
  - github: NorfairKing/autodocodec
    commit: f2c0551cdb3f9829b97f76b927d0c83833f9ef7f
    subdirs:
      - autodocodec
      - autodocodec-yaml
      - autodocodec-nix
      - autodocodec-schema

system-ghc: true

ghc-options:
  $everything: -split-sections
  "$locals": -fwrite-ide-info
