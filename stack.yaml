resolver: lts-22.22

packages:
  - .

extra-deps:
  - github: L7R7/gitlab-api
    commit: db7ece328be2cbb7941270ef903c64ecc2ad23c7
    subdirs:
      - gitlab-api-http-client
      - gitlab-api-http-client-mtl
      - gitlab-api-types
  - github: NorfairKing/opt-env-conf
    commit: a5715ee7181b22292add9eea381b3b03641841e6
    subdirs:
      - opt-env-conf
      - opt-env-conf-test
  - github: NorfairKing/safe-coloured-text
    commit: 046f10147a058c00c2706d98c341219e3cbc7669
    subdirs:
      - safe-coloured-text
      - safe-coloured-text-layout
      - safe-coloured-text-gen
  - github: NorfairKing/autodocodec
    commit: ac36615cb344ec43259fb65cafe3e55308ce4662
    subdirs:
      - autodocodec
      - autodocodec-yaml
      - autodocodec-nix
      - autodocodec-schema

system-ghc: true

ghc-options:
  $everything: -split-sections
  "$locals": -fwrite-ide-info
